services:
  db:
    image: postgres:15-alpine
    container_name: gym_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gym_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/002-normalized_db.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: